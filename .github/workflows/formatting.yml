name: Format BGP Config
on:
  push:
    paths:
      - 'net253_bgp.yml'
permissions:
  contents: write
jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install tools
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Sort prefixes
        run: |
          python3 - <<'PYEOF'
          import ipaddress, subprocess, yaml

          with open("net253_bgp.yml") as f:
              data = yaml.safe_load(f)

          changed = False

          for key in ("netblocks4", "netblocks6"):
              if key not in data or not data[key]:
                  continue
              original = [e["prefix"] for e in data[key]]
              sorted_entries = sorted(
                  data[key],
                  key=lambda e: (
                      ipaddress.ip_network(e["prefix"], strict=False).network_address,
                      ipaddress.ip_network(e["prefix"], strict=False).prefixlen
                  )
              )
              if [e["prefix"] for e in sorted_entries] != original:
                  data[key] = sorted_entries
                  changed = True

          if changed:
              with open("net253_bgp.yml", "w") as f:
                  yaml.dump(data, f, default_flow_style=False, sort_keys=False)
              print("Prefixes reordered")
          else:
              print("Already sorted, nothing to do")
          PYEOF
      - name: Commit if changed
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add net253_bgp.yml
          git commit -m "style: sort prefixes by length then address"
          git push
